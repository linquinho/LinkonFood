spring.datasource.url=jdbc:mysql://${DB_HOST:mysql}:3306/linkonfood-pedidos?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.application.name=pedidos-ms
server.port=${SERVER_PORT:8086}
eureka.client.serviceUrl.defaultZone=http://${EUREKA_SERVER:server}:8081/eureka/
eureka.instance.instance-id=${spring.application.name}:${random.uuid}


spring.main.allow-bean-definition-overriding=true
spring.cloud.compatibility-verifier.enabled=false


eureka.instance.prefer-ip-address=true

eureka.instance.lease-renewal-interval-in-seconds=5
eureka.instance.lease-expiration-duration-in-seconds=10







