name: "AWS Infrastructure Deployment"

on:
  push:
    branches:
      - main
    paths:
      - 'terraform/**' 

jobs:
  terraform:
    name: "Terraform Apply"
    runs-on: ubuntu-latest

    steps:
      # 1. Código do repositório para o servidor do GitHub
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Credenciais da AWS para o Terraform
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      # 3. Instala o Terraform no servidor do GitHub
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      # 4. Inicializa o Terraform (baixa os plugins da AWS)
      - name: Terraform Init
        run: terraform init
        working-directory: ./terraform

      # 5. Valida se a sintaxe do código
      - name: Terraform Validate
        run: terraform validate
        working-directory: ./terraform

      # 6. Cria a infraestrutura na AWS injetando a chave publica
      - name: Terraform Apply
        run: terraform apply -auto-approve
        working-directory: ./terraform
        env:
          TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }} 
